<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dusty Tab Notes</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div class="header">
    <div class="group-badge">
      <div class="group-dot" id="groupDot"></div>
      <span class="group-label" id="groupLabel">Loading...</span>
    </div>
    <button class="toggle-btn active" id="toggleMode">
      <span id="toggleIcon">Preview</span>
    </button>
  </div>

  <div class="editor-container">
    <textarea
      class="editor hidden"
      id="editor"
      placeholder="Start typing… or type / for commands"
      spellcheck="false"
    ></textarea>
    <div
      class="preview"
      id="preview"
      contenteditable="true"
      spellcheck="false"
    ></div>
    <div class="slash-menu hidden" id="slashMenu"></div>
  </div>

  <div class="status-bar" id="saveStatus">Ready</div>

  <!-- Prism syntax highlighting (local) -->
  <link rel="stylesheet" href="lib/prism/prism-tomorrow.min.css">
  <link rel="stylesheet" href="lib/prism/prism-line-numbers.min.css">
  <script src="lib/prism/prism.min.js"></script>
  <script src="lib/prism/prism-line-numbers.min.js"></script>
  <script src="lib/prism/prism-typescript.min.js"></script>
  <script src="lib/prism/prism-python.min.js"></script>
  <script src="lib/prism/prism-bash.min.js"></script>
  <script src="lib/prism/prism-json.min.js"></script>
  <script src="lib/prism/prism-sql.min.js"></script>
  <script src="lib/prism/prism-markdown.min.js"></script>
  <script src="lib/prism/prism-ruby.min.js"></script>
  <script src="lib/prism/prism-go.min.js"></script>
  <script src="lib/prism/prism-java.min.js"></script>
  <script src="lib/prism/prism-rust.min.js"></script>
  <script src="lib/prism/prism-cpp.min.js"></script>
  <script src="lib/prism/prism-csharp.min.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
